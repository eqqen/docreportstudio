<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд — docreportstudio</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
      --soft: #f3f4f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-email { color: var(--muted); font-size: 14px; }
    .btn-logout {
      padding: 7px 14px;
      font-size: 13px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .btn-logout:hover { background: var(--soft); }

    main { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 16px; margin-bottom: 32px; }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
      display: block;
    }
    .app-card:hover:not(.disabled) {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .app-card.disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: #eff6ff;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .app-card.disabled .badge {
      color: var(--muted);
      background: var(--soft);
    }
    .app-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .app-card p { color: var(--muted); font-size: 14px; }

    .loading {
      max-width: 1100px;
      margin: 80px auto;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .user-email { display: none; }
      h1 { font-size: 22px; }
      main { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Загрузка…</div>

  <header style="display: none;" id="header">
    <div class="header-inner">
      <a href="/app/" class="logo">docreport<span>studio</span></a>
      <div class="header-right">
        <span class="user-email" id="user-email"></span>
        <button class="btn-logout" id="logout-btn">Выйти</button>
      </div>
    </div>
  </header>

  <main style="display: none;" id="main">
    <h1 id="greeting">Здравствуйте</h1>
    <p class="subtitle">Выберите инструмент</p>

    <div class="apps">
      <a href="/app/cervical/" class="app-card" id="card-cervical">
        <span class="badge">МРТ ШОП</span>
        <h3>Шейный отдел позвоночника</h3>
        <p>Сформировать готовый протокол МРТ ШОП</p>
      </a>

      <a href="/app/lspine/" class="app-card" id="card-lspine">
        <span class="badge">МРТ ПОП</span>
        <h3>Поясничный отдел позвоночника</h3>
        <p>Сформировать готовый протокол МРТ ПОП</p>
      </a>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://jgzsbfzivqlvruwewigg.supabase.co',
      'sb_publishable_zRM4hYATscFC1m98kYQRtg_MzkeD0BO'
    )

    const { data: { session } } = await supabase.auth.getSession()

    if (!session) {
      window.location.replace('/?auth=required')
    } else {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('header').style.display = 'block'
      document.getElementById('main').style.display = 'block'
      document.getElementById('user-email').textContent = session.user.email

      // Логируем открытие дашборда (не блокируем UI)
      supabase.from('app_events').insert({
        user_id: session.user.id,
        event_type: 'dashboard_opened',
        app_name: 'dashboard',
        payload: { ts: new Date().toISOString() }
      }).then(() => {}).catch(() => {})

      // Запретить переход к "Скоро подключим"
      document.querySelectorAll('.app-card.disabled').forEach(el => {
        el.addEventListener('click', e => e.preventDefault())
      })
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.replace('/')
    })
  </script>

  <script type="module" src="/assets/feedback.js"></script>
</body>
</html>
